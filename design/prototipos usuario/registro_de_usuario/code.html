<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro - H2O Chimal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

                        "on-primary-fixed-variant": "#004491",
                        "secondary": "#00658d",
                        "on-background": "#0b1c30",
                        "surface-tint": "#115cb9",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#acc7ff",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed-dim": "#44d8f1",
                        "tertiary-container": "#00626f",
                        "secondary-fixed": "#c6e7ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-fixed-variant": "#004c6b",
                        "tertiary-fixed": "#a1efff",
                        "surface-dim": "#cbdbf5",

                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "on-surface": "#0b1c30",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#004e59",
                        "on-tertiary-fixed": "#001f25",
                        "secondary-fixed-dim": "#82cfff",
                        "primary": "#003f87",
                        "on-error": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#d7e2ff",
                        "on-secondary-container": "#004866"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "40px",
                        "stack-md": "24px",
                        "container-margin": "20px",
                        "base": "8px",
                        "stack-sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "h1": ["Public Sans"],
                        "h3": ["Public Sans"],

<style>
        body { background-color: theme('colors.background'); }
        /* Custom input focus ring overriding default tailwind forms */
        input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-background min-h-screen flex flex-col">
<!-- TopAppBar: Rendered for Brand Anchor, simplified for linear flow -->
<header class="flex items-center justify-between px-container-margin w-full h-16 bg-surface border-b border-outline-variant sticky top-0 z-50">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-h2 text-h2 text-primary font-bold">H2O Chimal</span>
</div>
<button aria-label="Volver" class="text-on-surface-variant hover:bg-surface-container p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow px-container-margin py-stack-lg max-w-3xl mx-auto w-full">
<div class="mb-stack-lg text-center md:text-left">
<h1 class="font-h1 text-h1 text-on-background mb-base">Crear Cuenta</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Por favor, ingrese sus datos para registrarse en el sistema municipal.</p>
</div>
<form class="flex flex-col gap-stack-lg bg-surface-container-lowest p-stack-md rounded-xl border border-outline-variant shadow-sm">
<!-- Section: Datos de Cuenta -->
<fieldset class="flex flex-col gap-stack-md border-b border-outline-variant pb-stack-lg">
<legend class="font-h3 text-h3 text-on-background mb-stack-sm w-full">Datos de Acceso</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-base col-span-1 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Correo electrónico</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
<div class="flex flex-col gap-base col-span-1 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Contraseña</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<p class="font-label-xs text-label-xs text-outline flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                            Mínimo 8 caracteres.
                        </p>
</div>
</div>
</fieldset>
<!-- Section: Datos Personales -->
<fieldset class="flex flex-col gap-stack-md border-b border-outline-variant pb-stack-lg">
<legend class="font-h3 text-h3 text-on-background mb-stack-sm w-full">Datos Personales</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-base col-span-1 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="fullname">Nombre completo</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullname" name="fullname" placeholder="Nombre(s) y Apellidos" type="text"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="curp">CURP</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors uppercase" id="curp" name="curp" placeholder="18 caracteres alfanuméricos" type="text"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="phone">Número telefónico</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="phone" name="phone" placeholder="10 dígitos" type="tel"/>
</div>
</div>
</fieldset>
<!-- Section: Domicilio -->
<fieldset class="flex flex-col gap-stack-md">
<legend class="font-h3 text-h3 text-on-background mb-stack-sm w-full">Domicilio</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="zip">Código postal</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="zip" name="zip" placeholder="Ej. 56330" type="text"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="colonia">Colonia</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="colonia" name="colonia" placeholder="Nombre de la colonia o barrio" type="text"/>
</div>
<div class="flex flex-col gap-base col-span-1 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="street">Calle</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="street" name="street" placeholder="Nombre de la calle" type="text"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="manzana">Manzana (Opcional)</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="manzana" name="manzana" placeholder="Ej. 12" type="text"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="num_ext">Número exterior</label>
<input class="w-full px-gutter py-stack-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="num_ext" name="num_ext" placeholder="S/N o número" type="text"/>
</div>
</div>
</fieldset>
<!-- Actions -->
<div class="mt-stack-sm pt-stack-md border-t border-outline-variant flex justify-end">
<button class="w-full md:w-auto px-8 py-3 bg-primary text-on-primary font-label-sm text-label-sm rounded-full shadow-[0_4px_14px_0_rgba(0,63,135,0.2)] hover:bg-primary-container transition-colors duration-200" type="submit">
                    Guardar Registro
                </button>
</div>
</form>
</main>
</body></html>
