version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: h2o_db
      POSTGRES_USER: h2o_user
      POSTGRES_PASSWORD: h2o_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn h2o.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      ceph:
        condition: service_started
    ports:
      - "8000:8000"

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./backend/deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  ceph:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: h2o_access
      MINIO_ROOT_PASSWORD: h2o_secret
    volumes:
      - ceph_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  ceph_data:
