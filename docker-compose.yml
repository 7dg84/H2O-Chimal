# version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: h2o_db
      POSTGRES_USER: h2o_user
      POSTGRES_PASSWORD: h2o_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - internal_net

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn h2o.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      ceph:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - internal_net

  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    environment:
      TZ: "Australia/Brisbane"
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - internal_net

  ceph:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: h2o_access
      MINIO_ROOT_PASSWORD: h2o_secret
    volumes:
      - ceph_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal_net

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    networks:
      - internal_net
    depends_on:
      - web

volumes:
  db_data:
  ceph_data:
  npm_data:
  npm_letsencrypt:

networks:
  internal_net:
    driver: bridge
